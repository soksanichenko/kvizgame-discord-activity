---
name: Build
run-name: "${{ github.event.workflow_run.display_title || 'Manual build' }}"

on:
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  verify:
    name: Verify collaborator
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check actor has write access
        uses: actions/github-script@v9
        with:
          script: |
            const actor = context.payload.workflow_run?.actor?.login ?? context.actor;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: actor,
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(`${actor} does not have write access — build blocked`);
            }

  build:
    name: Build and push
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kvizgame-discord-activity:${{ github.event.workflow_run.head_sha || github.sha }}
            ghcr.io/${{ github.repository_owner }}/kvizgame-discord-activity:latest
          labels: |
            org.opencontainers.image.description=KvizGame Discord Activity
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
