---
name: Lint

on:
  push:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        continue-on-error: true
        with:
          args: "check kvizgame/ main.py"

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check kvizgame/ main.py"
