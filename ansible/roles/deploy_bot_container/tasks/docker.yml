---
- name: Create images volume directory
  ansible.builtin.file:
    path: "{{ docker_lib_folder }}/{{ docker_volumes['images']['path'] }}"
    recurse: yes
    state: directory
  become: yes

- name: Ensure Docker network exists
  community.docker.docker_network:
    name: "{{ docker_network }}"
  become: yes

- name: Start RSSHub container
  community.docker.docker_container:
    name: rsshub
    image: "diygod/rsshub:latest"
    state: started
    restart_policy: always
    networks:
      - name: "{{ docker_network }}"
    log_driver: journald
  become: yes

- name: Deploy discord-meow-bot container
  community.docker.docker_container:
    name: discord-meow-bot
    image: "ghcr.io/soksanichenko/discord-meow-bot:{{ bot_image_tag }}"
    state: started
    pull: "{{ bot_image_pull }}"
    recreate: yes
    restart_policy: always
    command:
      - "-c"
      - >-
        venv/bin/python3 sources/scripts/create_db.py &&
        venv/bin/alembic -c sources/alembic.ini upgrade head &&
        venv/bin/python3 sources/scripts/main.py
    mounts:
      - source: "{{ docker_lib_folder }}/{{ docker_volumes['images']['path'] }}"
        target: "/code/images"
        read_only: no
        type: bind
    published_ports:
      - "127.0.0.1:{{ health_port }}:{{ health_port }}"
      - "127.0.0.1:{{ kvizgame_port }}:{{ kvizgame_port }}"
    networks: "{{ [{'name': docker_network}] + docker_extra_networks }}"
    env:
      DISCORD_TOKEN: "{{ discord_token }}"
      DISCORD_CLIENT_ID: "{{ discord_client_id }}"
      DISCORD_CLIENT_SECRET: "{{ discord_client_secret }}"
      DISCORD_PROXY_TARGET: "{{ discord_proxy_target }}"
      HEALTH_PORT: "{{ health_port | string }}"
      BIRTHDAY_IMAGES_DIR: "/code/images"
      YOUTUBE_API_KEY: "{{ youtube_api_key }}"
      SPOTIFY_API_CLIENT_ID: "{{ spotify_api_client_id }}"
      SPOTIFY_API_CLIENT_SECRET: "{{ spotify_api_client_secret }}"
      DB_LOGIN: "{{ db_login }}"
      DB_PASSWORD: "{{ db_password }}"
      DB_HOST: "{{ db_host }}"
      DB_DATABASE: "{{ db_database }}"
      DB_PORT: "{{ db_port | string }}"
      RSSHUB_URL: "http://rsshub:1200"
      TWITCH_CLIENT_ID: "{{ twitch_client_id }}"
      TWITCH_CLIENT_SECRET: "{{ twitch_client_secret }}"
      KVIZGAME_FRONTEND_DIR: "/code/frontend"
    log_driver: journald
  become: yes
  no_log: true

- name: Wait for bot health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ health_port }}/health"
    status_code: 200
  register: health_result
  retries: 18
  delay: 10
  until: health_result.status == 200
...
